<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniDB Web Console</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --success: #3fb950;
  --error: #f85149;
  --warn: #d29922;
  --input-bg: #0d1117;
  --input-border: #21262d;
  --font: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', 'Courier New', monospace;
  --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

button {
  font-family: var(--font-ui);
  cursor: pointer;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  transition: all .15s;
}
button:active { transform: scale(.97); }

input, textarea {
  font-family: var(--font);
  background: var(--input-bg);
  color: var(--text);
  border: 1px solid var(--input-border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
input:focus, textarea:focus { border-color: var(--accent); }

/* ---- Login Screen ---- */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; width: 100vw;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 48px 40px;
  width: 400px;
  max-width: 90vw;
}
.login-card h1 {
  font-size: 26px; font-weight: 600;
  color: var(--accent); text-align: center; margin-bottom: 6px;
}
.login-card .subtitle {
  color: var(--text-dim); text-align: center; margin-bottom: 32px;
  font-size: 14px;
}
.login-card label {
  display: block; font-size: 13px; font-weight: 500;
  color: var(--text-dim); margin-bottom: 4px; margin-top: 14px;
}
.login-card input {
  width: 100%; padding: 10px 12px; font-size: 14px;
}
.login-card button {
  width: 100%; margin-top: 24px; padding: 10px;
  background: #1f6feb; color: #fff; border-color: #1f6feb;
  font-size: 15px; font-weight: 600;
}
.login-card button:hover { background: #388bfd; }
.login-error {
  color: var(--error); font-size: 13px; text-align: center;
  margin-top: 14px; min-height: 20px;
}

/* ---- Workspace ---- */
#workspace { display: none; height: 100vh; grid-template-rows: auto 1fr auto; }

/* Top Bar */
#topbar {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 8px 16px; height: 44px;
  -webkit-app-region: no-drag;
}
#topbar .brand { font-weight: 700; font-size: 15px; color: var(--accent); }
#topbar .session-info { font-size: 13px; color: var(--text-dim); }
#topbar .session-info span { color: var(--text); font-weight: 500; }
#btn-logout {
  background: transparent; color: var(--error); border-color: var(--error);
  font-size: 12px; padding: 4px 12px;
}
#btn-logout:hover { background: rgba(248,81,73,.1); }

/* Main area */
#main-area {
  display: grid; grid-template-columns: 240px 1fr 220px;
  height: 100%; overflow: hidden;
}

/* Sidebar */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 12px; overflow-y: auto;
}
.sidebar-header {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .5px; color: var(--text-dim); margin-bottom: 8px;
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-header button {
  background: transparent; border: none; color: var(--text-dim);
  font-size: 14px; padding: 0 4px; line-height: 1;
}
.sidebar-header button:hover { color: var(--accent); }

.db-node {
  padding: 5px 8px; border-radius: 4px; cursor: pointer;
  font-size: 13px; display: flex; align-items: center; gap: 6px;
  user-select: none;
}
.db-node:hover { background: rgba(88,166,255,.08); }
.db-node.active { background: rgba(88,166,255,.15); color: var(--accent); }
.db-node .icon { font-size: 14px; }

.table-node {
  padding: 4px 8px 4px 28px; border-radius: 4px; cursor: pointer;
  font-size: 12px; color: var(--text-dim); user-select: none;
  font-family: var(--font);
}
.table-node:hover { color: var(--text); background: rgba(88,166,255,.06); }

/* Center panel */
#center-panel {
  display: flex; flex-direction: column; overflow: hidden;
}

/* SQL Editor */
#editor-area {
  padding: 12px 16px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
#sql-input {
  width: 100%; min-height: 80px; max-height: 200px;
  resize: vertical; line-height: 1.5;
}
.editor-actions {
  display: flex; gap: 8px; margin-top: 8px; align-items: center;
}
#btn-execute {
  background: #1f6feb; color: #fff; border-color: #1f6feb; font-weight: 600;
}
#btn-execute:hover { background: #388bfd; }
#btn-execute:disabled { opacity: .4; cursor: not-allowed; }
#btn-clear { background: transparent; color: var(--text-dim); }
#btn-clear:hover { color: var(--text); }
.editor-hint { font-size: 11px; color: var(--text-dim); flex: 1; text-align: right; }

/* Results */
#result-panel {
  flex: 1; overflow-y: auto; padding: 12px 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.result-empty {
  color: var(--text-dim); font-size: 14px; text-align: center;
  margin-top: 60px;
}

.result-card {
  border-radius: 8px; overflow: hidden; border: 1px solid var(--border);
}
.result-card .card-header {
  display: flex; align-items: center; gap: 6px; padding: 8px 12px;
  font-size: 12px; font-weight: 600; border-bottom: 1px solid var(--border);
}
.result-card.info .card-header { background: rgba(88,166,255,.06); color: var(--accent); }
.result-card.table .card-header { background: rgba(63,185,80,.06); color: var(--success); }
.result-card.error .card-header { background: rgba(248,81,73,.06); color: var(--error); }
.result-card .card-body { padding: 10px 14px; max-height: 400px; overflow: auto; }

.result-card table {
  width: 100%; border-collapse: collapse; font-family: var(--font); font-size: 13px;
}
.result-card table th {
  text-align: left; padding: 6px 10px; border-bottom: 2px solid var(--border);
  color: var(--accent); font-weight: 600; white-space: nowrap;
}
.result-card table td {
  padding: 5px 10px; border-bottom: 1px solid var(--input-border);
  white-space: nowrap; max-width: 300px; overflow: hidden; text-overflow: ellipsis;
}
.result-card table tr:nth-child(even) td { background: rgba(255,255,255,.01); }
.result-card table tr:hover td { background: rgba(88,166,255,.04); }
.result-card .row-count { padding: 6px 10px; font-size: 12px; color: var(--text-dim); }

.result-card .text-msg {
  font-family: var(--font); font-size: 13px; line-height: 1.5;
  white-space: pre-wrap; word-break: break-all;
}

/* Right Panel */
#right-panel {
  background: var(--surface);
  border-left: 1px solid var(--border);
  padding: 12px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 16px;
}
.quick-btn {
  width: 100%; text-align: left; background: transparent; color: var(--text);
  font-family: var(--font); font-size: 12px; padding: 6px 10px;
  margin-bottom: 4px;
}
.quick-btn:hover { background: rgba(88,166,255,.08); color: var(--accent); }

#history-list { max-height: 200px; overflow-y: auto; }
.history-item {
  font-family: var(--font); font-size: 11px; padding: 4px 6px;
  color: var(--text-dim); cursor: pointer; border-radius: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 2px;
}
.history-item:hover { background: rgba(88,166,255,.08); color: var(--text); }

/* Status Bar */
#statusbar {
  display: flex; align-items: center; gap: 16px;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 4px 16px; font-size: 11px; color: var(--text-dim); height: 28px;
}
#statusbar .dot { width: 7px; height: 7px; border-radius: 50%; }
#statusbar .dot.on { background: var(--success); }
#statusbar .dot.off { background: var(--error); }

/* Responsive */
@media (max-width: 900px) {
  #main-area { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; }
  .sidebar { border-right: none; border-bottom: 1px solid var(--border); max-height: 160px; }
  #right-panel { border-left: none; border-top: 1px solid var(--border); max-height: 160px; flex-direction: row; flex-wrap: wrap; }
}
</style>
</head>
<body>

<!-- ===== Login Screen ===== -->
<div id="login-screen">
  <div class="login-card">
    <h1>MiniDB</h1>
    <p class="subtitle">Web Console</p>
    <label for="login-username">Username</label>
    <input type="text" id="login-username" placeholder="Enter username" autocomplete="off">
    <label for="login-password">Password</label>
    <input type="password" id="login-password" placeholder="Enter password">
    <button id="btn-login" onclick="doLogin()">Login / Register</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ===== Workspace ===== -->
<div id="workspace">
  <!-- Top Bar -->
  <div id="topbar">
    <div class="brand">MiniDB</div>
    <div class="session-info">Logged in as <span id="top-user">-</span>@<span id="top-db">-</span></div>
    <button id="btn-logout" onclick="doLogout()">Logout</button>
  </div>

  <!-- Main Area -->
  <div id="main-area">
    <!-- Left: DB Explorer -->
    <div class="sidebar" id="explorer">
      <div class="sidebar-header">
        Databases
        <button onclick="refreshDatabases()" title="Refresh">&#x21bb;</button>
      </div>
      <div id="db-tree"></div>
    </div>

    <!-- Center: Editor + Results -->
    <div id="center-panel">
      <div id="editor-area">
        <textarea id="sql-input" placeholder="Enter SQL statement... (Ctrl+Enter to execute)" spellcheck="false"></textarea>
        <div class="editor-actions">
          <button id="btn-execute" onclick="doExecute()">Execute</button>
          <button id="btn-clear" onclick="clearEditor()">Clear</button>
          <span class="editor-hint">Ctrl+Enter</span>
        </div>
      </div>
      <div id="result-panel">
        <div class="result-empty">Execute a query to see results here.</div>
      </div>
    </div>

    <!-- Right: Quick Actions + History -->
    <div id="right-panel">
      <div>
        <div class="sidebar-header">Quick Actions</div>
        <button class="quick-btn" onclick="runSQL('SHOW DATABASES;')">SHOW DATABASES</button>
        <button class="quick-btn" onclick="runSQL('SHOW TABLES;')">SHOW TABLES</button>
        <button class="quick-btn" onclick="runSQL('SHOW USERS;')">SHOW USERS</button>
        <button class="quick-btn" onclick="runSQL('SHOW AUDIT LOG;')">SHOW AUDIT LOG</button>
        <button class="quick-btn" onclick="promptSQL('DESC ', 'Enter table name:')">DESC ...</button>
        <button class="quick-btn" onclick="promptSQL('SELECT * FROM ', 'Enter table name:')">SELECT * FROM ...</button>
        <button class="quick-btn" onclick="promptSQL('DROP TABLE ', 'Enter table name to drop:')">DROP TABLE ...</button>
        <button class="quick-btn" onclick="promptSQL('CREATE TABLE ', 'Enter: name (col type, ...)')">CREATE TABLE ...</button>
        <button class="quick-btn" onclick="promptSQL('INSERT INTO ', 'Enter: name VALUES (v1, v2, ...)')">INSERT INTO ...</button>
        <button class="quick-btn" onclick="promptSQL('CREATE DATABASE ', 'Enter database name:')">CREATE DATABASE</button>
        <button class="quick-btn" onclick="promptSQL('CONNECT ', 'Enter database name:')">CONNECT ...</button>
        <button class="quick-btn" onclick="promptSQL('CREATE USER ', 'Enter: name IDENTIFIED BY ''pass'' ROLE ADMIN')">CREATE USER ...</button>
        <button class="quick-btn" onclick="promptSQL('GRANT ', 'Enter: SELECT, INSERT TO username')">GRANT ...</button>
        <button class="quick-btn" onclick="promptSQL('SHOW GRANTS FOR ', 'Enter username:')">SHOW GRANTS FOR ...</button>
      </div>
      <div>
        <div class="sidebar-header">History</div>
        <div id="history-list"></div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div id="statusbar">
    <span class="dot on" id="status-dot"></span>
    <span>Connected to <strong id="status-db">-</strong></span>
    <span>|</span>
    <span>Logged in as <strong id="status-user">-</strong></span>
  </div>
</div>

<script>
// ===== State =====
let token = null;
let currentUser = '';
let currentDb = '';
let queryHistory = [];

// ===== DOM refs =====
const $loginScreen = document.getElementById('login-screen');
const $workspace    = document.getElementById('workspace');
const $loginError   = document.getElementById('login-error');
const $sqlInput     = document.getElementById('sql-input');
const $resultPanel  = document.getElementById('result-panel');
const $btnExecute   = document.getElementById('btn-execute');
const $dbTree       = document.getElementById('db-tree');
const $historyList  = document.getElementById('history-list');

// ===== API helpers =====
async function api(endpoint, body) {
  try {
    const resp = await fetch('/api/' + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    return await resp.json();
  } catch (e) {
    return { success: false, type: 'error', message: 'Network error: ' + e.message };
  }
}

// ===== Login =====
function updateUIState() {
  if (token) {
    $loginScreen.style.display = 'none';
    $workspace.style.display = 'grid';
    document.getElementById('top-user').textContent = currentUser;
    document.getElementById('top-db').textContent = currentDb;
    document.getElementById('status-user').textContent = currentUser;
    document.getElementById('status-db').textContent = currentDb;
  } else {
    $loginScreen.style.display = 'flex';
    $workspace.style.display = 'none';
    token = null;
    currentUser = '';
    currentDb = '';
    queryHistory = [];
  }
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;

  if (!username) {
    $loginError.textContent = 'Username is required.';
    return;
  }

  $loginError.textContent = '';
  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.textContent = 'Logging in...';

  const result = await api('login', { username, password });

  btn.disabled = false;
  btn.textContent = 'Login / Register';

  if (result.success) {
    token = result.token;
    currentUser = result.currentUser || username;
    currentDb = result.currentDb || 'default';
    updateUIState();
    clearResults();
    // Auto-load databases
    await refreshDatabases();
    addStatusMsg('Login successful. Welcome, ' + currentUser + '.');
  } else {
    $loginError.textContent = result.message || 'Login failed.';
  }
}

async function doLogout() {
  if (!token) return;
  await api('logout', { token });
  token = null;
  updateUIState();
}

// ===== Execute SQL =====
async function doExecute() {
  const sql = $sqlInput.value.trim();
  if (!sql || !token) return;

  $btnExecute.disabled = true;
  $btnExecute.textContent = 'Running...';

  const result = await api('execute', { token, sql });

  $btnExecute.disabled = false;
  $btnExecute.textContent = 'Execute';

  addToHistory(sql);
  addResult(result);

  // Update state from response
  if (result.currentDb) currentDb = result.currentDb;
  if (result.currentUser) currentUser = result.currentUser;
  updateUIState();

  // If connected to a new DB, refresh table list
  const upper = sql.toUpperCase().trim();
  if (upper.startsWith('CONNECT ') || upper.startsWith('CREATE DATABASE') ||
      upper.startsWith('DROP DATABASE') || upper.startsWith('CREATE TABLE') ||
      upper.startsWith('DROP TABLE') || upper.startsWith('ALTER TABLE')) {
    await refreshDatabases();
  }
  if (upper.startsWith('LOGOUT')) {
    token = null;
    updateUIState();
  }
}

async function runSQL(sql) {
  $sqlInput.value = sql;
  await doExecute();
}

async function promptSQL(prefix, promptText) {
  const val = prompt(promptText);
  if (val !== null) {
    $sqlInput.value = prefix + val + (prefix.endsWith(' ') ? ';' : ' ;');
    $sqlInput.focus();
    // Don't auto-execute for potentially dangerous operations; let user review
    if (prefix.startsWith('SHOW') || prefix.startsWith('DESC') || prefix.startsWith('CONNECT')) {
      await doExecute();
    }
  }
}

// ===== Results =====
function clearResults() {
  $resultPanel.innerHTML = '';
}

function addStatusMsg(msg) {
  // Add a temporary status message that fades
  const div = document.createElement('div');
  div.className = 'result-card info';
  div.innerHTML = `<div class="card-header">&#8505; Info</div>
    <div class="card-body"><div class="text-msg">${escapeHtml(msg)}</div></div>`;
  $resultPanel.appendChild(div);
  scrollResults();
}

function addResult(result) {
  // Remove empty-state placeholder
  const empty = $resultPanel.querySelector('.result-empty');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = 'result-card ' + result.type;

  let header = 'Result';
  let body = '';

  if (result.type === 'table') {
    header = 'Query Result';
    body = renderTable(result.message);
  } else if (result.type === 'error') {
    header = 'Error';
    body = `<div class="text-msg" style="color:var(--error)">${escapeHtml(result.message)}</div>`;
  } else {
    header = 'Info';
    body = `<div class="text-msg">${escapeHtml(result.message)}</div>`;
  }

  div.innerHTML = `<div class="card-header">${header}</div><div class="card-body">${body}</div>`;
  $resultPanel.appendChild(div);
  scrollResults();
}

function parseTableText(text) {
  const lines = text.split('\n');
  const rows = [];
  let rowCount = 0;
  for (const line of lines) {
    if (line.includes(' | ')) {
      rows.push(line.split(' | ').map(s => s.trim()));
    }
    // Match various count formats: (N rows), (N tables), (N databases), etc.
    const m = line.match(/\((\d+)\s*\w+\)/);
    if (m) rowCount = parseInt(m[1], 10);
  }
  return { rows, rowCount };
}

function renderTable(text) {
  const { rows, rowCount } = parseTableText(text);
  if (rows.length === 0) {
    return `<div class="text-msg">${escapeHtml(text)}</div>`;
  }

  let html = '<table>';
  // Header
  if (rows.length > 0) {
    html += '<thead><tr>';
    for (const h of rows[0]) html += `<th>${escapeHtml(h)}</th>`;
    html += '</tr></thead>';
  }
  // Data rows
  html += '<tbody>';
  for (let i = 1; i < rows.length; i++) {
    html += '<tr>';
    for (const cell of rows[i]) html += `<td>${escapeHtml(cell)}</td>`;
    html += '</tr>';
  }
  html += '</tbody></table>';

  if (rowCount > 0) {
    html += `<div class="row-count">${rowCount} row${rowCount !== 1 ? 's' : ''}</div>`;
  }
  return html;
}

function scrollResults() {
  $resultPanel.scrollTop = $resultPanel.scrollHeight;
}

function clearEditor() {
  $sqlInput.value = '';
  $sqlInput.focus();
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ===== Database Explorer =====
async function refreshDatabases() {
  if (!token) return;
  // Get databases
  let dbResult = await api('execute', { token, sql: 'SHOW DATABASES;' });
  const dbNames = [];
  if (dbResult.success) {
    const { rows } = parseTableText(dbResult.message);
    for (let i = 1; i < rows.length; i++) {
      if (rows[i].length > 0) dbNames.push(rows[i][0]);
    }
  }
  if (dbNames.length === 0) dbNames.push('default');

  // Get tables for current DB
  let tblResult = await api('execute', { token, sql: 'SHOW TABLES;' });
  const tblNames = [];
  if (tblResult.success) {
    const { rows } = parseTableText(tblResult.message);
    for (let i = 1; i < rows.length; i++) {
      if (rows[i].length > 0) tblNames.push(rows[i][0]);
    }
  }

  renderDBTree(dbNames, tblNames);
}

function renderDBTree(dbNames, tblNames) {
  let html = '';
  for (const db of dbNames) {
    const active = (db === currentDb) ? ' active' : '';
    html += `<div class="db-node${active}" onclick="connectToDB('${escapeHtml(db)}')">
      <span class="icon">&#128451;</span> ${escapeHtml(db)}
    </div>`;
    if (db === currentDb) {
      for (const tbl of tblNames) {
        html += `<div class="table-node" onclick="runSQL('SELECT * FROM ${escapeHtml(tbl)};')">
          &#9776; ${escapeHtml(tbl)}
        </div>`;
      }
    }
  }
  $dbTree.innerHTML = html;
}

async function connectToDB(dbName) {
  await runSQL('CONNECT ' + dbName + ';');
}

// ===== Query History =====
function addToHistory(sql) {
  // Remove duplicates
  queryHistory = queryHistory.filter(h => h !== sql);
  queryHistory.unshift(sql);
  if (queryHistory.length > 50) queryHistory.pop();
  renderHistory();
}

function renderHistory() {
  let html = '';
  for (const h of queryHistory) {
    html += `<div class="history-item" onclick="$sqlInput.value='${escapeHtml(h).replace(/'/g, "&#39;")}';$sqlInput.focus()">${escapeHtml(h)}</div>`;
  }
  $historyList.innerHTML = html || '<div style="color:var(--text-dim);font-size:11px">No queries yet</div>';
}

// ===== Keyboard shortcuts =====
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    doExecute();
  }
});

// Enter on login form
document.getElementById('login-password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('login-username').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('login-password').focus();
});

// ===== Init =====
updateUIState();
</script>
</body>
</html>
