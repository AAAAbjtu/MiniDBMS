<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniDB Web Console</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --success: #3fb950;
  --error: #f85149;
  --warn: #d29922;
  --input-bg: #0d1117;
  --input-border: #21262d;
  --font: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', 'Courier New', monospace;
  --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* Dark scrollbars */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #484f58; }
::-webkit-scrollbar-corner { background: transparent; }
* { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

button {
  font-family: var(--font-ui);
  cursor: pointer;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  transition: all .15s;
}
button:active { transform: scale(.97); }

input, textarea, select {
  font-family: var(--font);
  background: var(--input-bg);
  color: var(--text);
  border: 1px solid var(--input-border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
input:focus, textarea:focus, select:focus { border-color: var(--accent); }

/* ---- Login Screen ---- */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; width: 100vw;
}
.login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 48px 40px; width: 400px; max-width: 90vw; }
.login-card h1 { font-size: 26px; font-weight: 600; color: var(--accent); text-align: center; margin-bottom: 6px; }
.login-card .subtitle { color: var(--text-dim); text-align: center; margin-bottom: 32px; font-size: 14px; }
.login-card label { display: block; font-size: 13px; font-weight: 500; color: var(--text-dim); margin-bottom: 4px; margin-top: 14px; }
.login-card input { width: 100%; padding: 10px 12px; font-size: 14px; }
.login-card button { width: 100%; margin-top: 24px; padding: 10px; background: #1f6feb; color: #fff; border-color: #1f6feb; font-size: 15px; font-weight: 600; }
.login-card button:hover { background: #388bfd; }
.login-error { color: var(--error); font-size: 13px; text-align: center; margin-top: 14px; min-height: 20px; }

/* ---- Workspace ---- */
#workspace { display: none; height: 100vh; grid-template-rows: auto 1fr auto; }

/* Top Bar */
#topbar { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 16px; height: 44px; }
#topbar .brand { font-weight: 700; font-size: 15px; color: var(--accent); }
#topbar .session-info { font-size: 13px; color: var(--text-dim); }
#topbar .session-info span { color: var(--text); font-weight: 500; }
#btn-logout { background: transparent; color: var(--error); border-color: var(--error); font-size: 12px; padding: 4px 12px; }
#btn-logout:hover { background: rgba(248,81,73,.1); }

/* Main area */
#main-area { display: grid; grid-template-columns: 260px 1fr 220px; height: 100%; overflow: hidden; }

/* Sidebar */
.sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 8px; overflow-y: auto; }
.sidebar-header { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--text-dim); margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.sidebar-header button { background: transparent; border: none; color: var(--text-dim); font-size: 14px; padding: 0 4px; line-height: 1; }
.sidebar-header button:hover { color: var(--accent); }

/* Tree nodes */
.tree-leaf { padding: 3px 6px; cursor: pointer; border-radius: 3px; user-select: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tree-leaf:hover { background: rgba(88,166,255,.08); }
.db-node { font-size: 13px; display: flex; align-items: center; gap: 4px; font-weight: 500; }
.db-node .arrow { font-size: 10px; width: 12px; transition: transform .15s; display: inline-block; }
.db-node .arrow.open { transform: rotate(90deg); }
.db-node.active { background: rgba(88,166,255,.12); color: var(--accent); }
.tbl-node { font-size: 12px; padding-left: 26px; font-family: var(--font); color: var(--text-dim); }
.tbl-node:hover { color: var(--text); }
.tbl-node .arrow { font-size: 10px; width: 10px; transition: transform .15s; display: inline-block; }
.tbl-node .arrow.open { transform: rotate(90deg); }
.col-node { font-size: 11px; padding-left: 46px; font-family: var(--font); color: var(--text-dim); cursor: default; display: flex; align-items: center; gap: 4px; }
.col-node .col-type { color: var(--warn); cursor: pointer; }
.col-node .col-type:hover { text-decoration: underline; }
.col-node:hover { background: transparent; }
.fld-btn { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: transparent; border: 1px solid transparent; line-height: 1; }
.fld-btn:hover { background: rgba(88,166,255,.15); border-color: var(--border); }
.fld-btn.fld-del { color: var(--error); }
.fld-btn.fld-del:hover { background: rgba(248,81,73,.1); border-color: rgba(248,81,73,.3); }
.fld-btn.fld-add { color: var(--success); }
.fld-btn.fld-add:hover { background: rgba(63,185,80,.1); border-color: rgba(63,185,80,.3); }

/* Center panel */
#center-panel { display: flex; flex-direction: column; overflow: hidden; }

/* SQL Editor */
#editor-area { padding: 12px 16px 8px; border-bottom: 1px solid var(--border); background: var(--surface); }
#sql-input { width: 100%; min-height: 80px; max-height: 200px; resize: vertical; line-height: 1.5; }
.editor-actions { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
#btn-execute { background: #1f6feb; color: #fff; border-color: #1f6feb; font-weight: 600; }
#btn-execute:hover { background: #388bfd; }
#btn-execute:disabled { opacity: .4; cursor: not-allowed; }
#btn-clear { background: transparent; color: var(--text-dim); }
#btn-clear:hover { color: var(--text); }
#btn-clear-results { background: transparent; color: var(--warn); border-color: var(--warn); font-size: 12px; padding: 6px 12px; }
#btn-clear-results:hover { background: rgba(210,153,34,.1); }
.editor-hint { font-size: 11px; color: var(--text-dim); flex: 1; text-align: right; }

/* Results */
#result-panel { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
.result-empty { color: var(--text-dim); font-size: 14px; text-align: center; margin-top: 60px; }

.result-card { border-radius: 8px; overflow: hidden; border: 1px solid var(--border); flex-shrink: 0; }
.result-card .card-header { display: flex; align-items: center; gap: 6px; padding: 8px 12px; font-size: 12px; font-weight: 600; border-bottom: 1px solid var(--border); }
.result-card.info .card-header { background: rgba(88,166,255,.06); color: var(--accent); }
.result-card.table .card-header { background: rgba(63,185,80,.06); color: var(--success); }
.result-card.error .card-header { background: rgba(248,81,73,.06); color: var(--error); }
.result-card .card-body { padding: 10px 14px; max-height: 400px; overflow: auto; }

.result-card table { width: 100%; border-collapse: collapse; font-family: var(--font); font-size: 13px; }
.result-card table th { text-align: left; padding: 6px 10px; border-bottom: 2px solid var(--border); color: var(--accent); font-weight: 600; white-space: nowrap; }
.result-card table td { padding: 5px 10px; border-bottom: 1px solid var(--input-border); white-space: nowrap; max-width: 260px; overflow: hidden; text-overflow: ellipsis; }
.result-card table td.col-actions { max-width: none; width: 1%; }
.result-card table tr:nth-child(even) td { background: rgba(255,255,255,.01); }
.result-card table tr:hover td { background: rgba(88,166,255,.04); }
.result-card table tr.row-editing td { background: rgba(88,166,255,.1); }
.result-card .row-count { padding: 6px 10px; font-size: 12px; color: var(--text-dim); display: flex; align-items: center; justify-content: space-between; }

.result-card .text-msg { font-family: var(--font); font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }

/* Row action buttons */
.btn-row-act { font-size: 12px; padding: 2px 8px; margin: 0 2px; border-radius: 4px; }
.btn-edit { background: transparent; color: var(--accent); border-color: transparent; }
.btn-edit:hover { background: rgba(88,166,255,.15); }
.btn-del { background: transparent; color: var(--error); border-color: transparent; }
.btn-del:hover { background: rgba(248,81,73,.15); }
.btn-save-row { background: #1f6feb; color: #fff; border-color: #1f6feb; font-size: 12px; padding: 3px 10px; }
.btn-cancel-row { background: transparent; color: var(--text-dim); font-size: 12px; padding: 3px 10px; }
.btn-add-row { background: transparent; color: var(--success); border-color: var(--success); font-size: 12px; padding: 3px 12px; margin-top: 6px; }
.btn-add-row:hover { background: rgba(63,185,80,.1); }
.row-edit-input { font-size: 12px; padding: 3px 8px; width: 100%; min-width: 80px; }

/* Right Panel */
#right-panel { background: var(--surface); border-left: 1px solid var(--border); padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
.quick-btn { width: 100%; text-align: left; background: transparent; color: var(--text); font-family: var(--font); font-size: 12px; padding: 6px 10px; margin-bottom: 4px; }
.quick-btn:hover { background: rgba(88,166,255,.08); color: var(--accent); }

#history-list { max-height: 200px; overflow-y: auto; }
.history-item { font-family: var(--font); font-size: 11px; padding: 4px 6px; color: var(--text-dim); cursor: pointer; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.history-item:hover { background: rgba(88,166,255,.08); color: var(--text); }

/* Status Bar */
#statusbar { display: flex; align-items: center; gap: 16px; background: var(--surface); border-top: 1px solid var(--border); padding: 4px 16px; font-size: 11px; color: var(--text-dim); height: 28px; }
#statusbar .dot { width: 7px; height: 7px; border-radius: 50%; }
#statusbar .dot.on { background: var(--success); }
#statusbar .dot.off { background: var(--error); }

/* Responsive */
@media (max-width: 900px) {
  #main-area { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; }
  .sidebar { border-right: none; border-bottom: 1px solid var(--border); max-height: 180px; }
  #right-panel { border-left: none; border-top: 1px solid var(--border); max-height: 160px; flex-direction: row; flex-wrap: wrap; }
}
</style>
</head>
<body>

<!-- ===== Login Screen ===== -->
<div id="login-screen">
  <div class="login-card">
    <h1>MiniDB</h1>
    <p class="subtitle">Web Console</p>
    <label for="login-username">Username</label>
    <input type="text" id="login-username" placeholder="Enter username" autocomplete="off">
    <label for="login-password">Password</label>
    <input type="password" id="login-password" placeholder="Enter password">
    <button id="btn-login" onclick="doLogin()">Login / Register</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ===== Workspace ===== -->
<div id="workspace">
  <div id="topbar">
    <div class="brand">MiniDB</div>
    <div class="session-info">Logged in as <span id="top-user">-</span>@<span id="top-db">-</span></div>
    <button id="btn-logout" onclick="doLogout()">Logout</button>
  </div>

  <div id="main-area">
    <!-- Left: DB Explorer (tree) -->
    <div class="sidebar" id="explorer">
      <div class="sidebar-header">Explorer <button onclick="refreshDatabases()" title="Refresh">&#x21bb;</button></div>
      <div id="db-tree"></div>
    </div>

    <!-- Center: Editor + Results -->
    <div id="center-panel">
      <div id="editor-area">
        <textarea id="sql-input" placeholder="Enter SQL statement... (Ctrl+Enter to execute)" spellcheck="false"></textarea>
        <div class="editor-actions">
          <button id="btn-execute" onclick="doExecute()">Execute</button>
          <button id="btn-clear" onclick="clearEditor()">Clear</button>
          <button id="btn-clear-results" onclick="clearResults()">Clear Results</button>
          <span class="editor-hint">Ctrl+Enter</span>
        </div>
      </div>
      <div id="result-panel">
        <div class="result-empty">Execute a query to see results here.</div>
      </div>
    </div>

    <!-- Right: Quick Actions + History -->
    <div id="right-panel">
      <div>
        <div class="sidebar-header">Quick Actions</div>
        <button class="quick-btn" onclick="runSQL('SHOW DATABASES;')">SHOW DATABASES</button>
        <button class="quick-btn" onclick="runSQL('SHOW TABLES;')">SHOW TABLES</button>
        <button class="quick-btn" onclick="runSQL('SHOW USERS;')">SHOW USERS</button>
        <button class="quick-btn" onclick="runSQL('SHOW AUDIT LOG;')">SHOW AUDIT LOG</button>
        <button class="quick-btn" onclick="promptSQL('DESC ', 'Enter table name:')">DESC ...</button>
        <button class="quick-btn" onclick="promptSQL('SELECT * FROM ', 'Enter table name:')">SELECT * FROM ...</button>
        <button class="quick-btn" onclick="promptSQL('DROP TABLE ', 'Enter table name to drop:')">DROP TABLE ...</button>
        <button class="quick-btn" onclick="promptSQL('CREATE TABLE ', 'Enter: name (col type, ...)')">CREATE TABLE ...</button>
        <button class="quick-btn" onclick="promptSQL('INSERT INTO ', 'Enter: name VALUES (v1, v2, ...)')">INSERT INTO ...</button>
        <button class="quick-btn" onclick="promptSQL('CREATE DATABASE ', 'Enter database name:')">CREATE DATABASE</button>
        <button class="quick-btn" onclick="promptSQL('CONNECT ', 'Enter database name:')">CONNECT ...</button>
        <button class="quick-btn" onclick="promptSQL('CREATE USER ', 'Enter: name IDENTIFIED BY ''pass'' ROLE ADMIN')">CREATE USER ...</button>
        <button class="quick-btn" onclick="promptSQL('GRANT ', 'Enter: SELECT, INSERT TO username')">GRANT ...</button>
        <button class="quick-btn" onclick="promptSQL('SHOW GRANTS FOR ', 'Enter username:')">SHOW GRANTS FOR ...</button>
      </div>
      <div>
        <div class="sidebar-header">History</div>
        <div id="history-list"></div>
      </div>
    </div>
  </div>

  <div id="statusbar">
    <span class="dot on" id="status-dot"></span>
    <span>Connected to <strong id="status-db">-</strong></span>
    <span>|</span>
    <span>Logged in as <strong id="status-user">-</strong></span>
  </div>
</div>

<script>
// ===== State =====
let token = null;
let currentUser = '';
let currentDb = '';
let queryHistory = [];
// Tree state: expanded nodes and cached columns
let expandedDBs = {};
let tableColumns = {};    // key: "db.table" -> [{name, type}, ...]
let expandedTables = {};
// Row data store for inline editing (avoids HTML-attribute escaping bugs)
let rowDataMap = {};
let rowIdSeq = 0;

// ===== DOM refs =====
const $loginScreen = document.getElementById('login-screen');
const $workspace    = document.getElementById('workspace');
const $loginError   = document.getElementById('login-error');
const $sqlInput     = document.getElementById('sql-input');
const $resultPanel  = document.getElementById('result-panel');
const $btnExecute   = document.getElementById('btn-execute');
const $dbTree       = document.getElementById('db-tree');
const $historyList  = document.getElementById('history-list');

// ===== API helpers =====
async function api(endpoint, body) {
  try {
    const resp = await fetch('/api/' + endpoint, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    return await resp.json();
  } catch (e) {
    return { success: false, type: 'error', message: 'Network error: ' + e.message };
  }
}

// ===== Login =====
function updateUIState() {
  if (token) {
    $loginScreen.style.display = 'none';
    $workspace.style.display = 'grid';
    document.getElementById('top-user').textContent = currentUser;
    document.getElementById('top-db').textContent = currentDb;
    document.getElementById('status-user').textContent = currentUser;
    document.getElementById('status-db').textContent = currentDb;
  } else {
    $loginScreen.style.display = 'flex';
    $workspace.style.display = 'none';
    token = null; currentUser = ''; currentDb = '';
    queryHistory = [];
  }
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username) { $loginError.textContent = 'Username is required.'; return; }
  $loginError.textContent = '';
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Logging in...';

  const result = await api('login', { username, password });
  btn.disabled = false; btn.textContent = 'Login / Register';

  if (result.success) {
    token = result.token;
    currentUser = result.currentUser || username;
    currentDb = result.currentDb || 'default';
    localStorage.setItem('minidb_token', token);
    localStorage.setItem('minidb_user', currentUser);
    localStorage.setItem('minidb_db', currentDb);
    expandedDBs = {}; tableColumns = {}; expandedTables = {};
    updateUIState();
    clearResults();
    await refreshDatabases();
    addStatusMsg('Login successful. Welcome, ' + currentUser + '.');
  } else {
    $loginError.textContent = result.message || 'Login failed.';
  }
}

async function doLogout() {
  if (!token) return;
  await api('logout', { token });
  token = null;
  localStorage.removeItem('minidb_token');
  localStorage.removeItem('minidb_user');
  localStorage.removeItem('minidb_db');
  expandedDBs = {}; tableColumns = {}; expandedTables = {};
  updateUIState();
}

// ===== Execute SQL =====
async function doExecute() {
  const sql = $sqlInput.value.trim();
  if (!sql || !token) return;
  $btnExecute.disabled = true; $btnExecute.textContent = 'Running...';
  const result = await api('execute', { token, sql });
  $btnExecute.disabled = false; $btnExecute.textContent = 'Execute';

  addToHistory(sql);
  addResult(result);

  if (result.currentDb) currentDb = result.currentDb;
  if (result.currentUser) currentUser = result.currentUser;
  updateUIState();

  const upper = sql.toUpperCase().trim();
  if (upper.startsWith('CONNECT ') || upper.startsWith('CREATE DATABASE') ||
      upper.startsWith('DROP DATABASE') || upper.startsWith('CREATE TABLE') ||
      upper.startsWith('DROP TABLE') || upper.startsWith('ALTER TABLE')) {
    await refreshDatabases();
  }
  if (upper.startsWith('LOGOUT')) { token = null; updateUIState(); }
}

async function runSQL(sql) { $sqlInput.value = sql; await doExecute(); }

async function promptSQL(prefix, promptText) {
  const val = prompt(promptText);
  if (val !== null) {
    $sqlInput.value = prefix + val + (prefix.endsWith(' ') ? ';' : ' ;');
    $sqlInput.focus();
    if (prefix.startsWith('SHOW') || prefix.startsWith('DESC') || prefix.startsWith('CONNECT')) {
      await doExecute();
    }
  }
}

// ===== Results =====
function clearResults() { $resultPanel.innerHTML = ''; rowDataMap = {}; rowIdSeq = 0; }

function addStatusMsg(msg) {
  const div = document.createElement('div');
  div.className = 'result-card info';
  div.innerHTML = `<div class="card-header">&#8505; Info</div><div class="card-body"><div class="text-msg">${escapeHtml(msg)}</div></div>`;
  $resultPanel.appendChild(div); scrollResults();
}

function addResult(result) {
  const empty = $resultPanel.querySelector('.result-empty');
  if (empty) empty.remove();

  // Detect table name from last SQL for edit/delete buttons
  const lastSQL = queryHistory.length > 0 ? queryHistory[0] : '';
  const guessedTable = guessTableFromSQL(lastSQL) || '';
  if (result.type === 'table') {
    result._table = guessedTable;
  }

  const div = document.createElement('div');

  // Determine if this result should render as a table
  const looksLikeTable = result.type === 'table' ||
    (result.message && (result.message.includes(' | ') || /\(\d+\s*(rows?|columns?)\)/.test(result.message)));

  if (looksLikeTable && guessedTable) {
    result._table = guessedTable;
    div.className = 'result-card table';
    div.innerHTML = `<div class="card-header">Query Result</div><div class="card-body">${renderTable(result.message, result)}</div>`;
  } else if (result.type === 'table') {
    div.className = 'result-card table';
    div.innerHTML = `<div class="card-header">Query Result</div><div class="card-body">${renderTable(result.message, result)}</div>`;
  } else if (result.type === 'error') {
    div.className = 'result-card error';
    div.innerHTML = `<div class="card-header">Error</div><div class="card-body"><div class="text-msg" style="color:var(--error)">${escapeHtml(result.message)}</div></div>`;
  } else {
    div.className = 'result-card info';
    div.innerHTML = `<div class="card-header">Info</div><div class="card-body"><div class="text-msg">${escapeHtml(result.message)}</div></div>`;
  }
  $resultPanel.appendChild(div); scrollResults();
}

function parseTableText(text) {
  const lines = text.split('\n');
  const rows = []; let rowCount = 0;
  for (const line of lines) {
    if (line.includes(' | ')) rows.push(line.split(' | ').map(s => s.trim()));
    const m = line.match(/\((\d+)\s*\w+\)/);
    if (m) rowCount = parseInt(m[1], 10);
  }
  // Handle single-column output (no pipe separators)
  if (rows.length === 0 && text.match(/\(\d+\s*(rows?|columns?)\)/)) {
    const nonEmpty = lines.filter(l => l.trim());
    // Format: header + data lines + "(N rows|columns)"
    if (nonEmpty.length >= 2) {
      const header = nonEmpty[0].trim();
      rows.push([header]);
      for (let i = 1; i < nonEmpty.length - 1; i++) {
        rows.push([nonEmpty[i].trim()]);
      }
    }
  }
  return { rows, rowCount };
}

function parseListText(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  return lines.slice(1, -1).map(l => l.trim()).filter(l => l);
}

// Parse DESC output into [{name, type}, ...]
function parseDescText(text) {
  const cols = [];
  const lines = text.split('\n');
  for (const line of lines) {
    const parts = line.split('\t');
    if (parts.length >= 2) {
      const name = parts[0].trim();
      const type = parts[1].trim();
      if (name && type && name !== 'Field') cols.push({ name, type });
    }
  }
  return cols;
}

// Detect table name from SQL (heuristic: FROM <table> or DESC <table>)
function guessTableFromSQL(sql) {
  let m = sql.match(/FROM\s+(\w+)/i);
  if (m) return m[1];
  m = sql.match(/INTO\s+(\w+)/i);
  if (m) return m[1];
  m = sql.match(/DESC\s+(\w+)/i);
  if (m) return m[1];
  m = sql.match(/TABLE\s+(\w+)/i);
  if (m) return m[1];
  m = sql.match(/UPDATE\s+(\w+)/i);
  if (m) return m[1];
  m = sql.match(/DELETE\s+FROM\s+(\w+)/i);
  if (m) return m[1];
  return null;
}

function storeRowData(table, columns, values) {
  const rid = 'r' + (++rowIdSeq);
  rowDataMap[rid] = { table, columns, values };
  return rid;
}

function getRowData(tr) {
  return rowDataMap[tr.dataset.rid];
}

function renderTable(text, result) {
  const { rows, rowCount } = parseTableText(text);
  if (rows.length === 0) return `<div class="text-msg">${escapeHtml(text)}</div>`;

  const tableName = result && result._table ? result._table : null;
  const columns = rows.length > 0 ? rows[0] : [];

  let html = '<table><thead><tr>';
  for (const h of columns) html += `<th>${escapeHtml(h)}</th>`;
  html += '<th class="col-actions" style="width:50px"></th></tr></thead><tbody>';

  for (let i = 1; i < rows.length; i++) {
    const rid = storeRowData(tableName, columns, rows[i]);
    html += `<tr data-rid="${rid}">`;
    for (const cell of rows[i]) {
      html += `<td onclick="startEditCell(this)" title="Click to edit">${escapeHtml(cell)}</td>`;
    }
    html += `<td class="col-actions">
      <button class="btn-row-act btn-del" title="Delete row" onclick="deleteInlineRow(this)">&#10005;</button>
    </td></tr>`;
  }
  html += '</tbody></table>';

  html += `<div class="row-count">${rowCount} row${rowCount!==1?'s':''}`;
  if (tableName) {
    // Store columns for the add-row button
    const colKey = '_cols_' + tableName;
    rowDataMap[colKey] = columns;
    html += ` <button class="btn-add-row" onclick="addInlineRow(this, '${escapeJs(tableName)}')">+ Add Row</button>`;
  }
  html += '</div>';
  return html;
}

function scrollResults() { $resultPanel.scrollTop = $resultPanel.scrollHeight; }
function clearEditor() { $sqlInput.value = ''; $sqlInput.focus(); }
function escapeHtml(s) { const div = document.createElement('div'); div.textContent = s; return div.innerHTML; }
function escapeJs(s) { return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"'); }

// ===== Excel-style Inline Editing =====

function getRowValues(tr) {
  const vals = [];
  const cells = tr.querySelectorAll('td:not(.col-actions)');
  for (const td of cells) {
    const inp = td.querySelector('input');
    vals.push(inp ? inp.value : td.textContent);
  }
  return vals;
}

// Click a cell to start inline editing
function startEditCell(td) {
  const tr = td.parentElement;
  if (td.querySelector('input')) return;

  // Finish any other editing cell in the same row (update display only)
  finishCurrentEdit(tr);

  const origText = td.textContent;
  td.innerHTML = '';
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'row-edit-input';
  inp.value = origText;
  inp.setAttribute('data-orig', origText);
  td.appendChild(inp);
  inp.focus();
  inp.select();

  let committing = false;

  async function doCommit() {
    if (committing) return;
    committing = true;
    applyCellEdit(td, inp);    // update display
    await commitRowEdit(tr);   // save to database
  }

  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      doCommit();
    } else if (e.key === 'Tab') {
      e.preventDefault();
      applyCellEdit(td, inp);
      moveToNextCell(td);
    } else if (e.key === 'Escape') {
      e.preventDefault();
      cancelCellEdit(td, inp);
    }
  });

  inp.addEventListener('blur', function() {
    // Slight delay so click-on-another-cell doesn't interfere
    setTimeout(() => {
      if (td.querySelector('input') === inp) {
        doCommit();
      }
    }, 100);
  });
}

function applyCellEdit(td, inp) {
  const newVal = inp.value;
  const origVal = inp.getAttribute('data-orig');
  if (newVal !== origVal) {
    td.textContent = newVal;
    td.style.background = 'rgba(63,185,80,.15)';
    setTimeout(() => { td.style.background = ''; }, 800);
  } else {
    td.textContent = origVal;
  }
}

function cancelCellEdit(td, inp) {
  td.textContent = inp.getAttribute('data-orig');
}

function moveToNextCell(td) {
  const next = td.nextElementSibling;
  if (next && !next.classList.contains('col-actions')) {
    startEditCell(next);
  } else {
    const tr = td.parentElement;
    commitRowEdit(tr);
  }
}

function finishCurrentEdit(tr) {
  const inp = tr.querySelector('td:not(.col-actions) input');
  if (inp) {
    const td = inp.parentElement;
    applyCellEdit(td, inp);
  }
}

// Commit row: generate UPDATE from current values vs original
async function commitRowEdit(tr) {
  const data = getRowData(tr);
  if (!data || !data.table) return;
  const { table, columns, values: origVals } = data;

  const newVals = getRowValues(tr);
  let changed = false;
  for (let i = 0; i < columns.length; i++) {
    if (newVals[i] !== origVals[i]) { changed = true; break; }
  }
  if (!changed) return;

  // Update stored values
  data.values = newVals;

  let setParts = [];
  let whereParts = [];
  for (let i = 0; i < columns.length; i++) {
    setParts.push(columns[i] + ' = ' + quoteVal(newVals[i]));
    whereParts.push(columns[i] + ' = ' + quoteVal(origVals[i]));
  }
  const sql = 'UPDATE ' + table + ' SET ' + setParts.join(', ') + ' WHERE ' + whereParts.join(' AND ') + ';';

  const result = await api('execute', { token, sql });
  if (result.success) {
    addStatusMsg('Updated: ' + sql);
  } else {
    addResult(result);
    data.values = origVals;
    revertRowDisplay(tr, origVals);
  }
}

function revertRowDisplay(tr, vals) {
  const cells = tr.querySelectorAll('td:not(.col-actions)');
  cells.forEach((td, i) => { td.textContent = vals[i] || ''; });
}

// Delete row
function deleteInlineRow(btn) {
  const tr = btn.closest('tr');
  const data = getRowData(tr);
  if (!data || !data.table) return;
  const { table, columns, values } = data;
  let whereParts = [];
  for (let i = 0; i < columns.length; i++) {
    whereParts.push(columns[i] + ' = ' + quoteVal(values[i]));
  }
  const sql = 'DELETE FROM ' + table + ' WHERE ' + whereParts.join(' AND ') + ';';
  if (confirm('Delete this row?\n\n' + sql)) {
    runSQL(sql);
  }
}

// Add new row (inline)
function addInlineRow(btn, tableName) {
  const colKey = '_cols_' + tableName;
  const columns = rowDataMap[colKey] || [];
  const tableEl = btn.closest('.card-body').querySelector('table tbody');
  if (!tableEl) return;

  const existing = tableEl.querySelector('tr.row-adding');
  if (existing) existing.remove();

  const tr = document.createElement('tr');
  tr.className = 'row-adding';
  tr.style.background = 'rgba(63,185,80,.06)';
  for (const col of columns) {
    const td = document.createElement('td');
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'row-edit-input';
    inp.placeholder = col;
    td.appendChild(inp);
    tr.appendChild(td);
  }
  // Need to store tableName for saveNewRow
  tr.dataset.table = tableName;

  const tdAct = document.createElement('td');
  tdAct.className = 'col-actions';
  tdAct.innerHTML = '<button class="btn-row-act btn-save-row" title="Save" onclick="saveNewRow(this)">&#10003;</button>'
    + '<button class="btn-row-act btn-cancel-row" title="Cancel" onclick="cancelNewRow(this)">&#10005;</button>';
  tr.appendChild(tdAct);
  tableEl.appendChild(tr);

  const firstInp = tr.querySelector('input');
  if (firstInp) { firstInp.focus(); }

  tr.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); saveNewRow(tr.querySelector('.btn-save-row')); }
      if (e.key === 'Escape') { cancelNewRow(tr.querySelector('.btn-cancel-row')); }
      if (e.key === 'Tab') { e.preventDefault();
        const inputs = [...tr.querySelectorAll('input')];
        const idx = inputs.indexOf(inp);
        if (idx < inputs.length - 1) inputs[idx + 1].focus();
        else saveNewRow(tr.querySelector('.btn-save-row'));
      }
    });
  });
}

async function saveNewRow(btn) {
  const tr = btn.closest('tr');
  const tableName = tr.dataset.table;
  const colKey = '_cols_' + tableName;
  const columns = rowDataMap[colKey] || [];
  const inputs = tr.querySelectorAll('input');
  const vals = [...inputs].map(inp => inp.value.trim());

  const quotedVals = vals.map(v => quoteVal(v));
  const sql = 'INSERT INTO ' + tableName + ' (' + columns.join(', ') + ') VALUES (' + quotedVals.join(', ') + ');';

  const result = await api('execute', { token, sql });
  if (result.success) {
    addStatusMsg('Inserted: ' + sql);
    await runSQL('SELECT * FROM ' + tableName + ';');
  } else {
    addResult(result);
  }
}

function cancelNewRow(btn) {
  const tr = btn.closest('tr');
  tr.remove();
}

// Quote a value for SQL
function quoteVal(v) {
  if (v === '') return "''";
  if (/^-?\d+(\.\d+)?$/.test(v)) return v;
  return "'" + v.replace(/'/g, "''") + "'";
}

// ===== Tree: Databases -> Tables -> Columns =====
async function refreshDatabases() {
  if (!token) return;
  let dbResult = await api('execute', { token, sql: 'SHOW DATABASES;' });
  const dbNames = dbResult.success ? parseListText(dbResult.message) : [];
  if (dbNames.length === 0) dbNames.push('default');
  // Auto-expand current DB if not yet expanded
  if (currentDb && !expandedDBs[currentDb]) {
    expandedDBs[currentDb] = [];
  }
  renderDBTree(dbNames);
  // Fetch tables for expanded DBs
  for (const db of dbNames) {
    if (expandedDBs[db]) await fetchAndExpandDB(db);
  }
}

async function fetchAndExpandDB(dbName) {
  // Connect to DB to get its tables
  let prevDb = currentDb;
  if (currentDb !== dbName) {
    let r = await api('execute', { token, sql: 'CONNECT ' + dbName + ';' });
    if (r.currentDb) currentDb = r.currentDb;
  }
  let tblResult = await api('execute', { token, sql: 'SHOW TABLES;' });
  const tblNames = tblResult.success ? parseListText(tblResult.message) : [];
  // Restore previous DB if needed
  if (prevDb && prevDb !== currentDb) {
    let r = await api('execute', { token, sql: 'CONNECT ' + prevDb + ';' });
    if (r.currentDb) currentDb = r.currentDb;
  }
  expandedDBs[dbName] = tblNames;
  renderDBTree([]);  // re-render with all cached data
  // Restore expanded tables and their columns
  for (const tbl of tblNames) {
    let key = dbName + '.' + tbl;
    if (expandedTables[key]) await fetchTableColumns(dbName, tbl);
  }
}

async function toggleDB(dbName) {
  if (expandedDBs[dbName]) {
    delete expandedDBs[dbName];
  } else {
    expandedDBs[dbName] = [];  // placeholder while loading
    renderDBTree([]);
    await fetchAndExpandDB(dbName);
  }
  renderDBTree([]);
  updateUIState();  // restore currentDb display
}

async function fetchTableColumns(dbName, tableName) {
  let key = dbName + '.' + tableName;
  if (tableColumns[key]) return tableColumns[key];

  // Switch to this DB first to get column info
  let prevDb = currentDb;
  if (currentDb !== dbName) {
    let r = await api('execute', { token, sql: 'CONNECT ' + dbName + ';' });
    if (r.currentDb) currentDb = r.currentDb;
  }
  let descResult = await api('execute', { token, sql: 'DESC ' + tableName + ';' });
  if (prevDb && prevDb !== currentDb) {
    let r = await api('execute', { token, sql: 'CONNECT ' + prevDb + ';' });
    if (r.currentDb) currentDb = r.currentDb;
  }
  if (descResult.success) {
    tableColumns[key] = parseDescText(descResult.message);
  } else {
    tableColumns[key] = [];
  }
  return tableColumns[key];
}

async function toggleTable(dbName, tableName) {
  let key = dbName + '.' + tableName;
  if (expandedTables[key]) {
    delete expandedTables[key];
  } else {
    expandedTables[key] = true;
    await fetchTableColumns(dbName, tableName);
  }
  renderDBTree([]);
  updateUIState();
}

function renderDBTree(dbNames) {
  if (dbNames.length > 0) {
    // Update expandedDBs keys
    for (const db of dbNames) {
      if (!(db in expandedDBs)) expandedDBs[db] = expandedDBs[db] || null;
    }
  }

  let allDBs = Object.keys(expandedDBs);
  if (allDBs.length === 0 && dbNames.length > 0) {
    for (const d of dbNames) expandedDBs[d] = null;
    allDBs = dbNames;
  }
  if (allDBs.length === 0) allDBs.push('default');

  let html = '';
  for (const db of allDBs) {
    let isExp = !!expandedDBs[db];
    let tbls = expandedDBs[db] || [];
    let active = (db === currentDb) ? ' active' : '';

    html += `<div class="tree-leaf db-node${active}" onclick="toggleDB('${escapeJs(db)}')">
      <span class="arrow${isExp ? ' open' : ''}">&#9654;</span> <span>&#128451;</span> ${escapeHtml(db)}
    </div>`;

    if (isExp && tbls.length > 0) {
      for (const tbl of tbls) {
        let tKey = db + '.' + tbl;
        let tExp = !!expandedTables[tKey];
        html += `<div class="tree-leaf tbl-node" onclick="event.stopPropagation();toggleTable('${escapeJs(db)}','${escapeJs(tbl)}')">
          <span class="arrow${tExp ? ' open' : ''}">&#9654;</span> &#128196; ${escapeHtml(tbl)}
        </div>`;
        html += `<div class="tree-leaf tbl-node">
          <span style="cursor:pointer" onclick="runSQL('SELECT * FROM ${escapeJs(tbl)};')">&#128269; Query</span>
          <button class="fld-btn fld-add" title="Add column" onclick="event.stopPropagation();addColumn('${escapeJs(db)}','${escapeJs(tbl)}')">+Col</button>
        </div>`;

        if (tExp && tableColumns[tKey]) {
          for (const col of tableColumns[tKey]) {
            html += `<div class="tree-leaf col-node">
              &#8226; ${escapeHtml(col.name)}
              <span class="col-type" title="Click to modify type" onclick="event.stopPropagation();modifyColumn('${escapeJs(db)}','${escapeJs(tbl)}','${escapeJs(col.name)}','${escapeJs(col.type)}')">${escapeHtml(col.type)}</span>
              <button class="fld-btn fld-del" title="Drop column" onclick="event.stopPropagation();dropColumn('${escapeJs(db)}','${escapeJs(tbl)}','${escapeJs(col.name)}')">&#10005;</button>
            </div>`;
          }
        }
      }
    }
  }
  $dbTree.innerHTML = html || '<div style="color:var(--text-dim);font-size:12px">No databases</div>';
}

async function connectToDB(dbName) {
  await runSQL('CONNECT ' + dbName + ';');
}

// ===== Field Management =====
async function addColumn(db, table) {
  const input = prompt('Enter column definition:\nFormat: <name> <type>\nExample: age INT');
  if (!input) return;
  const parts = input.trim().split(/\s+/);
  if (parts.length < 2) { alert('Invalid format. Use: <name> <type>'); return; }
  const colName = parts[0];
  const colType = parts.slice(1).join(' ');
  // Switch to target DB, alter, then switch back
  const prevDb = currentDb;
  if (currentDb !== db) { let r = await api('execute', { token, sql: 'CONNECT ' + db + ';' }); if (r.currentDb) currentDb = r.currentDb; }
  await runSQL('ALTER TABLE ' + table + ' ADD ' + colName + ' ' + colType + ';');
  if (prevDb && prevDb !== currentDb) { let r = await api('execute', { token, sql: 'CONNECT ' + prevDb + ';' }); if (r.currentDb) currentDb = r.currentDb; }
  // Refresh column cache and tree
  let tKey = db + '.' + table;
  delete tableColumns[tKey];
  await fetchTableColumns(db, table);
  renderDBTree([]);
  updateUIState();
}

async function modifyColumn(db, table, colName, curType) {
  const newType = prompt('Modify type for ' + colName + ':\nCurrent type: ' + curType + '\nNew type:');
  if (!newType || newType.trim() === curType) return;
  const prevDb = currentDb;
  if (currentDb !== db) { let r = await api('execute', { token, sql: 'CONNECT ' + db + ';' }); if (r.currentDb) currentDb = r.currentDb; }
  await runSQL('ALTER TABLE ' + table + ' MODIFY COLUMN ' + colName + ' ' + newType.trim() + ';');
  if (prevDb && prevDb !== currentDb) { let r = await api('execute', { token, sql: 'CONNECT ' + prevDb + ';' }); if (r.currentDb) currentDb = r.currentDb; }
  let tKey = db + '.' + table;
  delete tableColumns[tKey];
  await fetchTableColumns(db, table);
  renderDBTree([]);
  updateUIState();
}

async function dropColumn(db, table, colName) {
  if (!confirm('Drop column ' + colName + ' from ' + table + '?\nThis will delete all data in this column.')) return;
  const prevDb = currentDb;
  if (currentDb !== db) { let r = await api('execute', { token, sql: 'CONNECT ' + db + ';' }); if (r.currentDb) currentDb = r.currentDb; }
  await runSQL('ALTER TABLE ' + table + ' DROP COLUMN ' + colName + ';');
  if (prevDb && prevDb !== currentDb) { let r = await api('execute', { token, sql: 'CONNECT ' + prevDb + ';' }); if (r.currentDb) currentDb = r.currentDb; }
  let tKey = db + '.' + table;
  delete tableColumns[tKey];
  await fetchTableColumns(db, table);
  renderDBTree([]);
  updateUIState();
}

// ===== Query History =====
function addToHistory(sql) {
  queryHistory = queryHistory.filter(h => h !== sql);
  queryHistory.unshift(sql);
  if (queryHistory.length > 50) queryHistory.pop();
  renderHistory();
}

function renderHistory() {
  let html = '';
  for (const h of queryHistory) {
    html += `<div class="history-item" onclick="$sqlInput.value='${escapeHtml(h).replace(/'/g, "&#39;")}';$sqlInput.focus()">${escapeHtml(h)}</div>`;
  }
  $historyList.innerHTML = html || '<div style="color:var(--text-dim);font-size:11px">No queries yet</div>';
}

// ===== Keyboard shortcuts =====
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); doExecute(); }
  if (e.key === 'Escape') {
    // Cancel any active inline cell edit
    const active = document.querySelector('.row-edit-input:focus');
    if (active) {
      const td = active.parentElement;
      td.textContent = active.getAttribute('data-orig');
    }
  }
});

document.getElementById('login-password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('login-username').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('login-password').focus();
});

// ===== Init =====
(async function init() {
  const savedToken = localStorage.getItem('minidb_token');
  const savedUser  = localStorage.getItem('minidb_user');
  const savedDb    = localStorage.getItem('minidb_db');
  if (savedToken && savedUser) {
    const status = await api('status', { token: savedToken });
    if (status.success) {
      token = savedToken;
      currentUser = status.currentUser || savedUser;
      currentDb = status.currentDb || savedDb || 'default';
      expandedDBs[currentDb] = [];  // auto-expand current DB
      updateUIState();
      clearResults();
      await refreshDatabases();
      addStatusMsg('Session restored. Welcome back, ' + currentUser + '.');
      return;
    }
    localStorage.removeItem('minidb_token');
    localStorage.removeItem('minidb_user');
    localStorage.removeItem('minidb_db');
  }
  updateUIState();
})();
